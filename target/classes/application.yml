spring:
  application:
    name: finance-twin

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/finance_twin}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: finance_twin
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: finance_twin
    schemas: finance_twin
    create-schemas: true
    baseline-on-migrate: true

  jackson:
    time-zone: UTC

server:
  port: ${SERVER_PORT:8080}
